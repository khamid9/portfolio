<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f3ef; color: #1c1917; }
.login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 360px; }
.login-box h1 { font-size: 22px; margin-bottom: 24px; text-align: center; }
.login-box input { width: 100%; padding: 12px 16px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 16px; }
.login-box button { width: 100%; padding: 12px; font-size: 16px; background: #1c1917; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
.login-box button:hover { background: #333; }
.login-box .error { color: #d32f2f; font-size: 14px; margin-top: 8px; text-align: center; }
.hidden { display: none; }
.admin { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
.admin h1 { font-size: 28px; margin-bottom: 32px; }
.section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
.section h2 { font-size: 18px; margin-bottom: 16px; color: #a07850; text-transform: uppercase; letter-spacing: 0.1em; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #666; }
.field input, .field textarea { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
.field textarea { min-height: 60px; resize: vertical; }
.field textarea.tall { min-height: 120px; }
.btn-save { padding: 14px 32px; font-size: 16px; background: #1c1917; color: #fff; border: none; border-radius: 8px; cursor: pointer; display: block; width: 100%; }
.btn-save:hover { background: #333; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1c1917; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="login" class="login">
  <div class="login-box">
    <h1>Admin</h1>
    <input type="password" id="password" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Login</button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<div id="admin" class="admin hidden">
  <h1>Edit Content</h1>
  <div id="forms"></div>
  <button class="btn-save" id="saveBtn" onclick="saveAll()">Save All Changes</button>
</div>

<div id="toast" class="toast"></div>

<script>
const PASSWORD_KEY = 'admin_pass'
const FILES = [
  'src/content/hero.json',
  'src/content/about.json',
  'src/content/experience.json',
  'src/content/education.json',
  'src/content/certificates.json',
  'src/content/languages.json',
  'src/content/contact.json'
]
const BASE = 'https://raw.githubusercontent.com/khamid9/portfolio/main/'
let allData = {}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 3000)
}

async function login() {
  const pw = document.getElementById('password').value
  if (!pw) return
  localStorage.setItem(PASSWORD_KEY, pw)
  document.getElementById('loginError').textContent = ''
  try {
    await loadEditor()
  } catch {
    document.getElementById('loginError').textContent = 'Wrong password'
    localStorage.removeItem(PASSWORD_KEY)
  }
}

async function loadEditor() {
  const promises = FILES.map(f =>
    fetch(BASE + f).then(r => r.json()).then(d => ({ path: f, data: d }))
  )
  const results = await Promise.all(promises)
  results.forEach(r => { allData[r.path] = r.data })

  document.getElementById('login').classList.add('hidden')
  document.getElementById('admin').classList.remove('hidden')
  renderForms()
}

function renderForms() {
  const container = document.getElementById('forms')
  container.innerHTML = ''

  // Hero
  const hero = allData['src/content/hero.json']
  container.innerHTML += sectionHTML('Hero', `
    <div class="field"><label>Name</label><input id="hero_name" value="${escape(hero.name)}"></div>
    <div class="field"><label>Subtitle</label><input id="hero_subtitle" value="${escape(hero.subtitle)}"></div>
    <div class="field"><label>Tags (comma-separated)</label><input id="hero_tags" value="${escape(hero.tags.join(', '))}"></div>
  `)

  // About
  const about = allData['src/content/about.json']
  container.innerHTML += sectionHTML('About', about.paragraphs.map((p, i) => `
    <div class="field"><label>Paragraph ${i+1} (**bold** for highlight)</label><textarea class="tall" id="about_${i}">${escape(p)}</textarea></div>
  `).join(''))

  // Experience
  const exp = allData['src/content/experience.json']
  container.innerHTML += sectionHTML('Experience', exp.map((item, i) => `
    <div style="border-bottom:1px solid #eee;padding-bottom:12px;margin-bottom:12px">
      <div class="field"><label>Period</label><input id="exp_${i}_period" value="${escape(item.period)}"></div>
      <div class="field"><label>Title</label><input id="exp_${i}_title" value="${escape(item.title)}"></div>
      <div class="field"><label>Subtitle</label><input id="exp_${i}_subtitle" value="${escape(item.subtitle)}"></div>
      <div class="field"><label>Description</label><textarea class="tall" id="exp_${i}_desc">${escape(item.description)}</textarea></div>
    </div>
  `).join(''))

  // Education
  const edu = allData['src/content/education.json']
  container.innerHTML += sectionHTML('Education', edu.map((item, i) => `
    <div style="border-bottom:1px solid #eee;padding-bottom:12px;margin-bottom:12px">
      <div class="field"><label>Period</label><input id="edu_${i}_period" value="${escape(item.period)}"></div>
      <div class="field"><label>Title</label><input id="edu_${i}_title" value="${escape(item.title)}"></div>
      <div class="field"><label>Subtitle</label><input id="edu_${i}_subtitle" value="${escape(item.subtitle)}"></div>
    </div>
  `).join(''))

  // Languages
  const lang = allData['src/content/languages.json']
  container.innerHTML += sectionHTML('Languages', `
    <div class="field"><label>Languages (comma-separated)</label><input id="lang_items" value="${escape(lang.items.join(', '))}"></div>
  `)

  // Contact
  const contact = allData['src/content/contact.json']
  container.innerHTML += sectionHTML('Contact', `
    <div class="field"><label>Email</label><input id="contact_email" value="${escape(contact.email)}"></div>
    <div class="field"><label>Phone</label><input id="contact_phone" value="${escape(contact.phone)}"></div>
    <div class="field"><label>Location</label><input id="contact_location" value="${escape(contact.location)}"></div>
  `)
}

function sectionHTML(title, fields) {
  return `<div class="section"><h2>${title}</h2>${fields}</div>`
}

function escape(s) {
  if (typeof s !== 'string') s = String(s || '')
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

async function saveAll() {
  const btn = document.getElementById('saveBtn')
  btn.disabled = true; btn.textContent = 'Saving...'

  const hero = allData['src/content/hero.json']
  hero.name = document.getElementById('hero_name').value
  hero.subtitle = document.getElementById('hero_subtitle').value
  hero.tags = document.getElementById('hero_tags').value.split(',').map(s => s.trim()).filter(Boolean)

  const about = allData['src/content/about.json']
  about.paragraphs = about.paragraphs.map((_, i) => document.getElementById(`about_${i}`).value)

  const exp = allData['src/content/experience.json']
  exp.forEach((item, i) => {
    item.period = document.getElementById(`exp_${i}_period`).value
    item.title = document.getElementById(`exp_${i}_title`).value
    item.subtitle = document.getElementById(`exp_${i}_subtitle`).value
    item.description = document.getElementById(`exp_${i}_desc`).value
  })

  const edu = allData['src/content/education.json']
  edu.forEach((item, i) => {
    item.period = document.getElementById(`edu_${i}_period`).value
    item.title = document.getElementById(`edu_${i}_title`).value
    item.subtitle = document.getElementById(`edu_${i}_subtitle`).value
  })

  const lang = allData['src/content/languages.json']
  lang.items = document.getElementById('lang_items').value.split(',').map(s => s.trim()).filter(Boolean)

  const contact = allData['src/content/contact.json']
  contact.email = document.getElementById('contact_email').value
  contact.phone = document.getElementById('contact_phone').value
  contact.location = document.getElementById('contact_location').value

  const pw = localStorage.getItem(PASSWORD_KEY)
  const files = Object.entries(allData).map(([path, content]) => ({
    path, content: JSON.stringify(content, null, 2) + '\n'
  }))

  try {
    const res = await fetch('/.netlify/functions/save', {
      method: 'POST',
      body: JSON.stringify({ password: pw, files })
    })
    const result = await res.json()
    if (res.ok) {
      showToast('Saved! Site will update in ~1 minute')
    } else {
      showToast('Error: ' + (result.error || 'Unknown'))
    }
  } catch (e) {
    showToast('Error: ' + e.message)
  }

  btn.disabled = false; btn.textContent = 'Save All Changes'
}

// Auto-login if password saved
if (localStorage.getItem(PASSWORD_KEY)) {
  document.getElementById('password').value = localStorage.getItem(PASSWORD_KEY)
  login()
}
</script>
</body>
</html>
