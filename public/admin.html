<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f3ef; color: #1c1917; }
.login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #fff; padding: 40px; border-radius: 12px; width: 360px; }
.login-box h1 { font-size: 22px; margin-bottom: 24px; text-align: center; }
.login-box input { width: 100%; padding: 12px 16px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 16px; }
.login-box button { width: 100%; padding: 12px; font-size: 16px; background: #1c1917; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
.login-box button:hover { background: #333; }
.login-box button:disabled { opacity: 0.5; cursor: not-allowed; }
.login-box .error { color: #d32f2f; font-size: 14px; margin-top: 8px; text-align: center; }
.hidden { display: none; }
.admin { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
.admin h1 { font-size: 28px; margin-bottom: 8px; }
.admin .subtitle { color: #78716c; font-size: 14px; margin-bottom: 32px; }
.section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
.section h2 { font-size: 18px; margin-bottom: 16px; color: #a07850; text-transform: uppercase; letter-spacing: 0.1em; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #666; }
.field input, .field textarea { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
.field textarea { min-height: 60px; resize: vertical; }
.field textarea.tall { min-height: 120px; }
.btn-save { padding: 14px 32px; font-size: 16px; background: #1c1917; color: #fff; border: none; border-radius: 8px; cursor: pointer; width: 100%; }
.btn-save:hover { background: #333; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sm { padding: 6px 14px; font-size: 13px; background: #1c1917; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
.btn-sm:hover { background: #333; }
.btn-sm.danger { background: #d32f2f; }
.btn-sm.danger:hover { background: #b71c1c; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1c1917; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 100; }
.toast.show { opacity: 1; }
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-bottom: 16px; }
.photo-item { position: relative; border-radius: 6px; overflow: hidden; border: 1px solid #eee; aspect-ratio: 3/4; }
.photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-item .del-btn { position: absolute; top: 4px; right: 4px; background: rgba(211,47,47,0.85); color: #fff; border: none; border-radius: 4px; width: 22px; height: 22px; font-size: 14px; cursor: pointer; line-height: 22px; text-align: center; padding: 0; }
.photo-item .del-btn:hover { background: #b71c1c; }
.upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; color: #78716c; font-size: 14px; margin-bottom: 8px; transition: border-color 0.2s; }
.upload-area:hover { border-color: #a07850; }
.upload-area input { display: none; }
.badge { display: inline-block; background: #ff9800; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin: 2px; }
.avatar-section { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.avatar-section img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; }
</style>
</head>
<body>

<div id="login" class="login">
  <div class="login-box">
    <h1>Admin</h1>
    <input type="password" id="password" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
    <button id="loginBtn" onclick="login()">Login</button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<div id="admin" class="admin hidden">
  <h1>Portfolio Admin</h1>
  <div class="subtitle">Edit text and photos — changes go live in ~1 minute</div>
  <div id="forms"></div>
  <div id="photos-section"></div>
  <button class="btn-save" id="saveBtn" onclick="saveAll()">Save All Changes</button>
  <div style="height:80px"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const FILES = ['hero','about','experience','education','certificates','languages','contact'].map(f => 'src/content/'+f+'.json')
const BASE = 'https://raw.githubusercontent.com/khamid9/portfolio/main/'
const PHOTO_BASE = BASE + 'public'
let allData = {}
let _uploads = {}
let _deletes = []

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 3000)
}

async function login() {
  const pw = document.getElementById('password').value.trim()
  if (!pw) return
  const btn = document.getElementById('loginBtn')
  const err = document.getElementById('loginError')
  btn.disabled = true; btn.textContent = 'Loading...'; err.textContent = ''
  try {
    const r = await fetch('/.netlify/functions/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, files: [] })
    })
    if (r.status === 401) { err.textContent = 'Wrong password'; btn.disabled = false; btn.textContent = 'Login'; return }
    if (!r.ok) throw new Error('Status ' + r.status)
    localStorage.setItem('admin_pass', pw)
    await loadAll()
    document.getElementById('login').classList.add('hidden')
    document.getElementById('admin').classList.remove('hidden')
  } catch(e) { err.textContent = 'Error: ' + e.message; btn.disabled = false; btn.textContent = 'Login' }
}

async function loadAll() {
  const promises = FILES.map(f =>
    fetch(BASE + f).then(r => { if (!r.ok) throw new Error('Failed ' + f); return r.json() }).then(d => ({ path: f, data: d }))
  )
  const results = await Promise.all(promises)
  results.forEach(r => { allData[r.path] = r.data })
  renderForms()
  renderPhotos()
}

function esc(s) {
  if (typeof s !== 'string') s = String(s || '')
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function sec(title, fields) { return `<div class="section"><h2>${title}</h2>${fields}</div>` }
function tf(id, label, val, opts = '') { return `<div class="field"><label>${label}</label><input id="${id}" value="${esc(val)}" ${opts}></div>` }
function ta(id, label, val, tall = true) { return `<div class="field"><label>${label}</label><textarea id="${id}" class="${tall?'tall':''}">${esc(val)}</textarea></div>` }

function renderForms() {
  const c = document.getElementById('forms')
  c.innerHTML = ''

  // Hero
  const h = allData['src/content/hero.json']
  let heroHTML = tf('hero_name','Full Name', h.name) + tf('hero_subtitle','Subtitle', h.subtitle) + tf('hero_tags','Tags (comma-separated)', h.tags.join(', '))
  h.stats.forEach((s, i) => {
    heroHTML += `<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <div style="flex:1">${tf('hero_stat_n_'+i, 'Stat '+(i+1)+' number', s.number)}</div>
      <div style="flex:2">${tf('hero_stat_l_'+i, '', s.label)}</div>
    </div>`
  })
  c.innerHTML += sec('Hero', heroHTML)

  // Avatar
  const avatarHTML = `<div class="avatar-section">
    <img src="${PHOTO_BASE}/photo.jpeg?t=${Date.now()}">
    <div><button class="btn-sm" onclick="document.getElementById('avatarInput').click()">Change Photo</button>
    <input type="file" id="avatarInput" accept="image/jpeg" style="display:none" onchange="uploadAvatar(this.files)">
    <div style="font-size:12px;color:#78716c;margin-top:4px">Recommended: 400×400 JPEG</div></div>
  </div>`
  c.innerHTML += sec('Avatar', avatarHTML)

  // About
  const a = allData['src/content/about.json']
  c.innerHTML += sec('About', a.paragraphs.map((p,i) => ta('about_'+i, 'Paragraph '+(i+1)+' (use **bold** for black text)', p)).join(''))

  // Experience
  const e = allData['src/content/experience.json']
  c.innerHTML += sec('Experience (${e.length} items)', e.map((item, i) =>
    `<div style="border-bottom:1px solid #eee;padding-bottom:12px;margin-bottom:12px">
      ${tf('exp_'+i+'_period','Period',item.period)}${tf('exp_'+i+'_title','Title',item.title)}${tf('exp_'+i+'_subtitle','Subtitle',item.subtitle)}
      ${ta('exp_'+i+'_desc','Description',item.description)}
    </div>`).join(''))

  // Education
  const edu = allData['src/content/education.json']
  c.innerHTML += sec('Education', edu.map((item, i) =>
    `<div style="border-bottom:1px solid #eee;padding-bottom:12px;margin-bottom:12px">
      ${tf('edu_'+i+'_period','Period',item.period)}${tf('edu_'+i+'_title','Title',item.title)}${tf('edu_'+i+'_subtitle','Subtitle',item.subtitle)}
    </div>`).join(''))

  // Languages
  const l = allData['src/content/languages.json']
  c.innerHTML += sec('Languages', tf('lang_items','Languages (comma-separated)', l.items.join(', ')))

  // Contact
  const ct = allData['src/content/contact.json']
  c.innerHTML += sec('Contact', tf('contact_email','Email',ct.email)+tf('contact_phone','Phone',ct.phone)+tf('contact_location','Location',ct.location))
}

function renderPhotos() {
  const cert = allData['src/content/certificates.json']
  const container = document.getElementById('photos-section')
  let html = ''
  cert.categories.forEach((cat, ci) => {
    html += `<div class="section"><h2>${esc(cat.name)} (${cat.photos.length} photos)</h2><div class="photo-grid" id="pg_${ci}">`
    cat.photos.forEach((p, pi) => {
      const src = p.src.replace('/certificates/', '')
      html += `<div class="photo-item" id="pi_${ci}_${pi}"><img src="${PHOTO_BASE}/certificates/${src}"><button class="del-btn" onclick="deletePhoto(${ci},${pi})">×</button></div>`
    })
    html += `</div><div class="upload-area" onclick="document.getElementById('fu_${ci}').click()">+ Add photos</div>
    <input type="file" id="fu_${ci}" accept="image/*" multiple onchange="uploadPhotos(${ci},this.files)" style="display:none">
    <div id="pend_${ci}"></div></div>`
  })
  container.innerHTML = html
}

function uploadAvatar(files) {
  if (!files[0]) return
  const file = files[0]
  if (file.type !== 'image/jpeg') { showToast('Please use JPEG format'); return }
  const reader = new FileReader()
  reader.onload = function(e) {
    _uploads['public/photo.jpeg'] = { content: e.target.result.split(',')[1], encoding: 'base64' }
    showToast('Avatar selected — click Save All Changes to upload')
    document.querySelector('.avatar-section img').src = e.target.result
  }
  reader.readAsDataURL(file)
}

function deletePhoto(ci, pi) {
  const cert = allData['src/content/certificates.json']
  const photo = cert.categories[ci].photos[pi]
  const filename = photo.src.replace('/certificates/', '')
  if (!confirm('Delete ' + filename + '?')) return
  cert.categories[ci].photos.splice(pi, 1)
  _deletes.push({ path: 'public/certificates/' + filename })
  renderPhotos()
  showToast('Marked "' + filename + '" for deletion')
}

function uploadPhotos(ci, files) {
  const cert = allData['src/content/certificates.json']
  for (const file of files) {
    const ext = file.name.split('.').pop().toLowerCase()
    const reader = new FileReader()
    reader.onload = function(e) {
      const base64 = e.target.result.split(',')[1]
      cert.categories[ci].photos.push({ src: '/certificates/' + file.name })
      _uploads['public/certificates/' + file.name] = { content: base64, encoding: 'base64' }
      document.getElementById('pend_' + ci).innerHTML += `<span class="badge">+ ${esc(file.name)}</span>`
      renderPhotos()
      showToast('Added "' + file.name + '"')
    }
    reader.readAsDataURL(file)
  }
}

async function saveAll() {
  const btn = document.getElementById('saveBtn')
  btn.disabled = true; btn.textContent = 'Saving...'

  // Collect all form data
  const h = allData['src/content/hero.json']
  h.name = document.getElementById('hero_name').value
  h.subtitle = document.getElementById('hero_subtitle').value
  h.tags = document.getElementById('hero_tags').value.split(',').map(s => s.trim()).filter(Boolean)
  h.stats.forEach((s, i) => {
    s.number = document.getElementById('hero_stat_n_'+i).value
    s.label = document.getElementById('hero_stat_l_'+i).value
  })

  const a = allData['src/content/about.json']
  a.paragraphs = a.paragraphs.map((_, i) => document.getElementById('about_'+i).value)

  const e = allData['src/content/experience.json']
  e.forEach((item, i) => {
    item.period = document.getElementById('exp_'+i+'_period').value
    item.title = document.getElementById('exp_'+i+'_title').value
    item.subtitle = document.getElementById('exp_'+i+'_subtitle').value
    item.description = document.getElementById('exp_'+i+'_desc').value
  })

  const edu = allData['src/content/education.json']
  edu.forEach((item, i) => {
    item.period = document.getElementById('edu_'+i+'_period').value
    item.title = document.getElementById('edu_'+i+'_title').value
    item.subtitle = document.getElementById('edu_'+i+'_subtitle').value
  })

  allData['src/content/languages.json'].items = document.getElementById('lang_items').value.split(',').map(s => s.trim()).filter(Boolean)

  const ct = allData['src/content/contact.json']
  ct.email = document.getElementById('contact_email').value
  ct.phone = document.getElementById('contact_phone').value
  ct.location = document.getElementById('contact_location').value

  // Build payload
  const pw = (localStorage.getItem('admin_pass') || '').trim()
  const textFiles = Object.entries(allData).map(([path, content]) => ({
    path, content: JSON.stringify(content, null, 2) + '\n'
  }))
  const uploadFiles = Object.entries(_uploads).map(([path, data]) => ({
    path, content: data.content, encoding: 'base64'
  }))

  try {
    const res = await fetch('/.netlify/functions/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, files: [...textFiles, ...uploadFiles], deletes: _deletes })
    })
    const result = await res.json()
    if (res.ok) {
      _uploads = {}; _deletes = []
      showToast('Saved! Site will update in ~1 minute')
    } else {
      showToast('Error: ' + (result.error || 'Unknown'))
    }
  } catch(e) { showToast('Error: ' + e.message) }
  btn.disabled = false; btn.textContent = 'Save All Changes'
}
</script>
</body>
</html>
